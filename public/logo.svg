  <!-- Wordmark -->
  <text x="72" y="30" font-family="Inter, system-ui, -apple-system, Arial, sans-serif" font-size="16" font-weight="800" fill="#121417" letter-spacing="1.6">ZHETYSU BAYI</text>
  <text x="72" y="50" font-family="Inter, system-ui, -apple-system, Arial, sans-serif" font-size="9" font-weight="500" fill="#6e7276" letter-spacing="7">STEEL</text>
</svg>
